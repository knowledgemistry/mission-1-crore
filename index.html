<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1 Crore in 365 Days</title>
    <style>
        /* Body aur HTML ko full screen set karna */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Scrollbars hatane ke liye */
            background-color: #000; /* Loading ke waqt black background */
        }

        /* Iframe styling */
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbyf1lFkqBBpfQ9TNctBiYyaDb-LeXP5WMhZ7gCywMp5-p1Q32Nfren34tQTb6F0IFjz/exec"
        allowfullscreen="true"
        allow="fullscreen">
    </iframe>

    <script>
        window.onload = function() {
            // Fullscreen trigger (Note: Browser ise block kar sakta hai jab tak user click na kare)
            const iframe = document.querySelector('iframe');
            iframe.requestFullscreen().catch((err) => {
                console.log("Auto-fullscreen blocked by browser. This is normal for security.");
            });
        };
    </script>
</body>
</html>
